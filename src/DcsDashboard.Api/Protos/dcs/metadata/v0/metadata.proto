syntax = "proto3";
package dcs.metadata.v0;
option csharp_namespace = "Groundcrew.DcsGrpc.V0.Metadata";

// Wire-compatible subset of the DCS-gRPC 0.8.1 metadata contract.
service MetadataService {
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse) {}
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse) {}
}

message GetHealthRequest {}
message GetHealthResponse { bool alive = 1; }
message GetVersionRequest {}
message GetVersionResponse { string version = 1; }
